name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure, build, and test
        run: bash scripts/ci-build.sh

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run sanitizer builds
        run: bash scripts/ci-sanitizers.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run coverage build
        run: bash scripts/coverage.sh

  benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run benchmark regression gate
        run: bash scripts/ci-bench-regression.sh
      - name: Upload benchmark candidates
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baselines
          path: benchmarks/baselines/*.json
          if-no-files-found: ignore
